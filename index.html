<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本格対戦型野球シミュレーター v13.3 (イニングスキップ機能追加)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1e242b;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        h1, h2, h3, h4 {
            text-align: center;
            color: #4caf50;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .box {
            background: #2a323d;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        .hidden { display: none !important; }

        /* ナビゲーション・タブ */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .nav-btn {
            background: #34495e;
            color: #fff;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        .nav-btn:hover { background: #415b76; }
        .nav-btn.active { background: #4caf50; }

        /* オーダー編成画面のレイアウト */
        .order-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .selection-pool {
            background: #1e242b;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #444;
            max-height: 750px;
            overflow-y: auto;
        }
        .pool-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        .pool-tab-btn {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
        }
        .pool-tab-btn.active { background: #3498db; }

        /* 選手選択ボタン */
        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
        }
        .player-card-btn {
            background: #34495e;
            border: 1px solid #555;
            color: white;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
            transition: all 0.2s;
        }
        .player-card-btn:hover { background: #455a6f; border-color: #3498db; }
        .player-card-btn.selected-home { background: #16a085; border-color: #1abc9c; opacity: 0.7; }
        .player-card-btn.selected-away { background: #2980b9; border-color: #3498db; opacity: 0.7; }

        /* ステータスバッジ */
        .stat-badge {
            display: inline-block;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: bold;
            color: #000 !important;
            font-size: 11px;
            margin: 1px;
        }

        .current-slots {
            background: #1e242b;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #444;
        }

        /* チーム切り替えタブ */
        .team-toggle-tabs {
            display: flex;
            margin-bottom: 15px;
            border-bottom: 2px solid #444;
        }
        .team-tab-btn {
            flex: 1;
            background: #2c3e50;
            color: #aaa;
            padding: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .team-tab-btn.active.home { background: #16a085; color: white; }
        .team-tab-btn.active.away { background: #2980b9; color: white; }

        .slot-row {
            display: flex;
            align-items: center;
            background: #2c3e50;
            margin: 4px 0;
            padding: 6px 10px;
            border-radius: 4px;
            border-left: 4px solid #e74c3c;
        }
        .slot-row.pitcher-slot { border-left-color: #3498db; }
        .slot-label { width: 80px; font-weight: bold; font-size: 14px; }
        .slot-value { flex-grow: 1; font-weight: bold; color: #ffeb3b; cursor: pointer; }
        .slot-cancel-btn { background: #c0392b; padding: 2px 6px; font-size: 11px; color: white; border: none; border-radius: 3px; cursor: pointer;}

        /* 試合画面スタイル */
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; background: #1e242b; font-size: 14px; }
        th, td { border: 1px solid #444; padding: 6px 8px; text-align: center; }
        th { background-color: #34495e; color: #fff; }
        button {
            background-color: #4caf50; color: white; border: none;
            padding: 12px 24px; border-radius: 4px; cursor: pointer;
            font-size: 16px; font-weight: bold;
        }
        button:hover { background-color: #45a049; }
        .btn-sm { padding: 3px 6px; font-size: 11px; background-color: #008cba; }
        .btn-secondary { background-color: #555; }
        .btn-secondary:hover { background-color: #444; }
        
        .scoreboard-table { width: 100%; font-weight: bold; font-family: monospace; font-size: 18px; margin-bottom: 20px; }
        .scoreboard-table th { background: #111; color: #aaa; }
        .scoreboard-table td { background: #222; color: #fff; font-size: 20px; }
        .scoreboard-table .total { color: #ffeb3b; }
        
        .game-layout { display: grid; grid-template-columns: 260px 1fr 260px; gap: 15px; }
        .field-status {
            background: #145a32; border: 4px solid #111; border-radius: 8px;
            padding: 15px; display: flex; flex-direction: column; align-items: center; position: relative;
        }
        .diamond {
            position: relative; width: 100px; height: 100px; transform: rotate(45deg); margin-bottom: 15px; border: 2px dashed rgba(255,255,255,0.2);
        }
        .base { position: absolute; width: 16px; height: 16px; background-color: #555; border: 2px solid #fff; }
        .base.active { background-color: #ff9800; box-shadow: 0 0 10px #ff9800; }
        #first-base { top: -8px; right: -8px; }
        #second-base { top: -8px; left: -8px; }
        #third-base { bottom: -8px; left: -8px; }
        .pitch-result-overlay { font-size: 24px; font-weight: 900; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); margin: 5px 0 10px 0; height: 30px; }
        .bso-container { width: 100%; font-family: monospace; font-size: 16px; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 5px; }
        .bso-row { display: flex; align-items: center; margin: 2px 0; }
        .bso-label { width: 20px; font-weight: bold; }
        #game-log { height: 220px; overflow-y: auto; background: #111; color: #0f0; padding: 12px; font-family: monospace; border-radius: 4px; line-height: 1.5; }
        .info-box { background: #34495e; padding: 10px; border-radius: 4px; text-align: center; font-weight: bold; }
        .team-display tr.highlight { background-color: #ffeb3b !important; color: #000 !important; font-weight: bold; }
    </style>
</head>
<body>

<h1>本格対戦型野球シミュレーター v13.3</h1>

<div class="container">
    
    <div class="nav-tabs">
        <button id="nav-order-btn" class="nav-btn active" onclick="switchPage('order')">⚙️ オーダー編成・選手作成</button>
        <button id="nav-game-btn" class="nav-btn" onclick="switchPage('game')">🏟️ 試合観戦</button>
    </div>

    <div id="page-order" class="box">
        <h2>オリジナル選手作成機能</h2>
        <div class="creator-form">
            <label>区分:</label>
            <select id="create-type" onchange="toggleCreatorFields()">
                <option value="batter">野手(打者)</option>
                <option value="pitcher-sp">投手(先発)</option>
                <option value="pitcher-rp">投手(中継ぎ・抑え)</option>
            </select>
            <label>名前:</label>
            <input type="text" id="create-name" placeholder="例: 山田 太陽" style="width:120px;">
            
            <span id="field-for-batter">
                <label>ミート:</label> <input type="number" id="create-meet" value="70" min="1" max="100" style="width:50px;">
                <label>パワー:</label> <input type="number" id="create-power" value="70" min="1" max="100" style="width:50px;">
            </span>
            <span id="field-for-pitcher" class="hidden">
                <label>球威:</label> <input type="number" id="create-pitcher-power" value="70" min="1" max="100" style="width:50px;">
                <label>制球:</label> <input type="number" id="create-control" value="70" min="1" max="100" style="width:50px;">
            </span>
            <button onclick="createOriginalPlayer()" class="btn-sm" style="background:#27ae60;">登録する</button>
        </div>

        <hr style="border:1px solid #444; margin:20px 0;">

        <h2>チームオーダー編成</h2>
        <p style="text-align:center; font-size:13px; color:#aaa;">右側のタブで編成するチームを切り替え、プールから選手を選択して配置してください（両チームの全枠を埋める必要があります）。</p>
        
        <div class="order-layout">
            <div class="selection-pool">
                <div class="pool-tabs">
                    <button id="pool-tab-b" class="pool-tab-btn active" onclick="switchPoolTab('batter')">野手 (30人+)</button>
                    <button id="pool-tab-sp" class="pool-tab-btn" onclick="switchPoolTab('pitcher-sp')">先発 (4人+)</button>
                    <button id="pool-tab-rp" class="pool-tab-btn" onclick="switchPoolTab('pitcher-rp')">中継ぎ・抑え (8人+)</button>
                </div>
                <div id="player-buttons-container" class="player-grid"></div>
            </div>

            <div class="current-slots">
                <div class="team-toggle-tabs">
                    <button id="team-tab-home" class="team-tab-btn active home" onclick="switchEditingTeam('home')">マイチーム (先攻)</button>
                    <button id="team-tab-away" class="team-tab-btn away" onclick="switchEditingTeam('away')">ライバルズ (後攻)</button>
                </div>

                <div id="slots-container"></div>
                <div style="text-align:center; margin-top:15px;">
                    <button onclick="autoFillCurrentOrder()" class="btn-sm btn-secondary">このチームをおまかせ編成</button>
                    <button onclick="startGameMode()" style="background:#2980b9; margin-left:10px;">試合開始！</button>
                </div>
            </div>
        </div>
    </div>

    <div id="page-game" class="box hidden">
        <table class="scoreboard-table">
            <thead><tr id="sb-header"></tr></thead>
            <tbody>
                <tr id="sb-home"></tr>
                <tr id="sb-away"></tr>
            </tbody>
        </table>

        <div class="game-layout">
            <div class="team-display">
                <h4 id="game-home-name" style="margin:5px; text-align:center;">マイチーム (先攻)</h4>
                <table>
                    <thead><tr><th>打</th><th>名前</th></tr></thead>
                    <tbody id="home-live-roster"></tbody>
                </table>
                <div id="home-live-pitcher" style="font-size:12px; text-align:center; background:#111; padding:5px; border-radius:4px;"></div>
            </div>

            <div class="center-panel">
                <div class="info-box" id="match-info">1回表 攻撃中</div>
                <div class="field-status">
                    <div class="diamond">
                        <div id="first-base" class="base"></div>
                        <div id="second-base" class="base"></div>
                        <div id="third-base" class="base"></div>
                    </div>
                    <div id="pitch-result-text" class="pitch-result-overlay" style="color:#fff; font-weight:bold;">PLAY BALL</div>
                    
                    <div class="bso-container">
                        <div class="bso-row"><span class="bso-label" style="color:#00ff00">B</span><span id="dots-b"></span></div>
                        <div class="bso-row"><span class="bso-label" style="color:#ffcc00">S</span><span id="dots-s"></span></div>
                        <div class="bso-row"><span class="bso-label" style="color:#ff0000">O</span><span id="dots-o"></span></div>
                    </div>
                </div>
                <div id="game-log"></div>
            </div>

            <div class="team-display">
                <h4 id="game-away-name" style="margin:5px; text-align:center;">ライバルズ (後攻)</h4>
                <table>
                    <thead><tr><th>打</th><th>名前</th></tr></thead>
                    <tbody id="away-live-roster"></tbody>
                </table>
                <div id="away-live-pitcher" style="font-size:12px; text-align:center; background:#111; padding:5px; border-radius:4px;"></div>
            </div>
        </div>

        <div style="display:flex; justify-content:center; gap:10px; margin-top:20px; flex-wrap:wrap;">
            <button id="next-pitch-btn" onclick="stepPitch()">1球すすめる</button>
            <button id="skip-7th-btn" class="btn-secondary" onclick="skipToInning(7)" style="background-color: #d35400;">7回まで飛ばす</button>
            <button id="skip-8th-btn" class="btn-secondary" onclick="skipToInning(8)" style="background-color: #c0392b;">8回まで飛ばす</button>
            <button id="auto-game-btn" class="btn-secondary" onclick="autoPlayGame()">一気に結果を見る</button>
            <button id="reset-game-btn" class="btn-sm btn-secondary hidden" onclick="initGame()">もう一度プレイ</button>
        </div>
    </div>

</div>

<script>
// --- 選手データプール ---
const masterPlayers = {
    batter: [
        { id: "b1", name: "坂本 蓮", meet: 85, power: 55, desc: "俊足巧打" },
        { id: "b2", name: "小林 誠", meet: 80, power: 60, desc: "好打者" },
        { id: "b3", name: "高橋 健太", meet: 88, power: 82, desc: "強打俊足" },
        { id: "b4", name: "長谷川 剛", meet: 72, power: 96, desc: "大砲" },
        { id: "b5", name: "宇野 拓真", meet: 75, power: 78, desc: "勝負強い" },
        { id: "b6", name: "斉藤 翼", meet: 78, power: 65, desc: "アベレージ" },
        { id: "b7", name: "井上 亮", meet: 70, power: 70, desc: "中距離打者" },
        { id: "b8", name: "岡田 敦", meet: 65, power: 58, desc: "堅実" },
        { id: "b9", name: "柴田 駿", meet: 82, power: 45, desc: "スピードスター" },
        { id: "b10", name: "新谷 翔馬", meet: 86, power: 50, desc: "安打製造機" },
        { id: "b11", name: "福田 宗佑", meet: 74, power: 72, desc: "ユーティリティ" },
        { id: "b12", name: "片岡 裕次", meet: 80, power: 85, desc: "天才スラッガー" },
        { id: "b13", name: "竹内 慶太", meet: 68, power: 92, desc: "スラッガー" },
        { id: "b14", name: "安藤 達也", meet: 72, power: 80, desc: "ポイントゲッター" },
        { id: "b15", name: "西岡 晃一", meet: 76, power: 62, desc: "いぶし銀" },
        { id: "b16", name: "藤原 陸斗", meet: 64, power: 76, desc: "意外性の男" },
        { id: "b17", name: "森下 玲央", meet: 70, power: 68, desc: "パンチ力" },
        { id: "b18", name: "金子 智樹", meet: 62, power: 55, desc: "守備職人打者" },
        { id: "b19", name: "今井 瑞樹", meet: 84, power: 40, desc: "韋駄天" },
        { id: "b20", name: "大島 一輝", meet: 75, power: 75, desc: "バランス型" },
        { id: "b21", name: "水野 陽介", meet: 78, power: 70, desc: "仕事人" },
        { id: "b22", name: "小野寺 駿", meet: 72, power: 88, desc: "主砲" },
        { id: "b23", name: "杉山 翔太", meet: 82, power: 82, desc: "至宝" },
        { id: "b24", name: "村上 涼介", meet: 66, power: 78, desc: "ロマン砲" },
        { id: "b25", name: "千葉 慎也", meet: 70, power: 65, desc: "繋ぎの切り札" },
        { id: "b26", name: "菊地 冬馬", meet: 68, power: 60, desc: "粘り打ち" },
        { id: "b27", name: "矢野 竜次", meet: 60, power: 74, desc: "一発あり" },
        { id: "b28", name: "武田 一真", meet: 80, power: 52, desc: "リードオフ" },
        { id: "b29", name: "遠藤 慶太", meet: 74, power: 84, desc: "クラッチヒッター" },
        { id: "b30", name: "濱田 大河", meet: 83, power: 60, desc: "広角打法" }
    ],
    "pitcher-sp": [
        { id: "p1", name: "菅原 大地", power: 86, control: 82, desc: "絶対的エース" },
        { id: "p2", name: "石川 雅人", power: 82, control: 78, desc: "本格派右腕" },
        { id: "p3", name: "荒木 康平", power: 80, control: 85, desc: "抜群の制球力" },
        { id: "p4", name: "小沢 拓也", power: 84, control: 76, desc: "タフな左腕" }
    ],
    "pitcher-rp": [
        { id: "p5", name: "松村 竜也", power: 81, control: 74, desc: "万能中継ぎ" },
        { id: "p6", name: "西村 航", power: 83, control: 72, desc: "キレで勝負" },
        { id: "p7", name: "浅野 大輔", power: 78, control: 78, desc: "安定感抜群" },
        { id: "p8", name: "中川 雄太", power: 92, control: 62, desc: "剛腕セットアップ" },
        { id: "p9", name: "江口 裕貴", power: 80, control: 75, desc: "火消し役" },
        { id: "p10", name: "栗原 達朗", power: 88, control: 66, desc: "奪三振マシン" },
        { id: "p11", name: "岸本 雅之", power: 82, control: 80, desc: "百戦錬磨" },
        { id: "p12", name: "榊原 大輝", power: 95, control: 70, desc: "絶対的守護神" }
    ]
};

// 編成中のチーム管理 ('home' または 'away')
let editingTeam = 'home';
let currentPoolTab = 'batter';
let selectedSlotId = null;

// 両チームのオーダー構成
let homeOrder = { batters: Array(9).fill(null), sp: null, rp: Array(3).fill(null) };
let awayOrder = { batters: Array(9).fill(null), sp: null, rp: Array(3).fill(null) };

function getTeamOrder(side) {
    return side === 'home' ? homeOrder : awayOrder;
}

// ステータスに応じたカラー取得
function getStatColor(value) {
    if (value >= 90) return "#ff3333";
    if (value >= 80) return "#ff9800";
    if (value >= 70) return "#ffeb3b";
    if (value >= 55) return "#00d2ff";
    return "#3498db";
}

// ページ切り替え
function switchPage(pageId) {
    document.getElementById('page-order').classList.add('hidden');
    document.getElementById('page-game').classList.add('hidden');
    document.getElementById('nav-order-btn').classList.remove('active');
    document.getElementById('nav-game-btn').classList.remove('active');

    if (pageId === 'order') {
        document.getElementById('page-order').classList.remove('hidden');
        document.getElementById('nav-order-btn').classList.add('active');
    } else if (pageId === 'game') {
        document.getElementById('page-game').classList.remove('hidden');
        document.getElementById('nav-game-btn').classList.add('active');
    }
}

// 編集チームの切り替え
function switchEditingTeam(team) {
    editingTeam = team;
    document.getElementById('team-tab-home').classList.remove('active');
    document.getElementById('team-tab-away').classList.remove('active');
    
    if(team === 'home') document.getElementById('team-tab-home').classList.add('active');
    if(team === 'away') document.getElementById('team-tab-away').classList.add('active');
    
    selectedSlotId = null;
    renderPoolButtons();
    renderSlots();
}

// オリジナル選手登録の入力切り替え
function toggleCreatorFields() {
    const type = document.getElementById('create-type').value;
    if (type === 'batter') {
        document.getElementById('field-for-batter').classList.remove('hidden');
        document.getElementById('field-for-pitcher').classList.add('hidden');
    } else {
        document.getElementById('field-for-batter').classList.add('hidden');
        document.getElementById('field-for-pitcher').classList.remove('hidden');
    }
}

// オリジナル選手作成機能
function createOriginalPlayer() {
    const type = document.getElementById('create-type').value;
    const name = document.getElementById('create-name').value.trim() || "名無し選手";
    const id = "custom_" + Date.now();

    if (type === 'batter') {
        const m = parseInt(document.getElementById('create-meet').value) || 50;
        const p = parseInt(document.getElementById('create-power').value) || 50;
        masterPlayers.batter.push({ id: id, name: name, meet: m, power: p, desc: "自作野手" });
        switchPoolTab('batter');
    } else {
        const pw = parseInt(document.getElementById('create-pitcher-power').value) || 50;
        const ct = parseInt(document.getElementById('create-control').value) || 50;
        if (type === 'pitcher-sp') {
            masterPlayers['pitcher-sp'].push({ id: id, name: name, power: pw, control: ct, desc: "自作先発" });
            switchPoolTab('pitcher-sp');
        } else {
            masterPlayers['pitcher-rp'].push({ id: id, name: name, power: pw, control: ct, desc: "自作中継ぎ" });
            switchPoolTab('pitcher-rp');
        }
    }
    document.getElementById('create-name').value = "";
    alert(`${name} をプールに登録しました！`);
}

function switchPoolTab(tab) {
    currentPoolTab = tab;
    document.getElementById('pool-tab-b').classList.remove('active');
    document.getElementById('pool-tab-sp').classList.remove('active');
    document.getElementById('pool-tab-rp').classList.remove('active');

    if (tab === 'batter') document.getElementById('pool-tab-b').classList.add('active');
    if (tab === 'pitcher-sp') document.getElementById('pool-tab-sp').classList.add('active');
    if (tab === 'pitcher-rp') document.getElementById('pool-tab-rp').classList.add('active');

    renderPoolButtons();
}

// 選手がどのチームに所属しているかチェック
function getPlayerBelonging(id) {
    if ((homeOrder.sp && homeOrder.sp.id === id) || homeOrder.batters.some(b => b && b.id === id) || homeOrder.rp.some(r => r && r.id === id)) return 'home';
    if ((awayOrder.sp && awayOrder.sp.id === id) || awayOrder.batters.some(b => b && b.id === id) || awayOrder.rp.some(r => r && r.id === id)) return 'away';
    return null;
}

// プールボタン群のレンダリング
function renderPoolButtons() {
    const container = document.getElementById('player-buttons-container');
    container.innerHTML = '';

    const list = masterPlayers[currentPoolTab];
    list.forEach(p => {
        const belonging = getPlayerBelonging(p.id);

        const btn = document.createElement('button');
        btn.className = 'player-card-btn';
        if (belonging === 'home') btn.classList.add('selected-home');
        if (belonging === 'away') btn.classList.add('selected-away');
        
        let statHTML = "";
        if (currentPoolTab === 'batter') {
            statHTML = `
                <span class="stat-badge" style="background:${getStatColor(p.meet)};">ミ:${p.meet}</span>
                <span class="stat-badge" style="background:${getStatColor(p.power)};">パ:${p.power}</span>`;
        } else {
            statHTML = `
                <span class="stat-badge" style="background:${getStatColor(p.power)};">球:${p.power}</span>
                <span class="stat-badge" style="background:${getStatColor(p.control)};">制:${p.control}</span>`;
        }
        
        let descStyle = p.desc.startsWith("自作") ? "color:#2ecc71; font-weight:bold;" : "color:#999;";
        let belongText = belonging === 'home' ? "【マイ】" : belonging === 'away' ? "【ライバル】" : "";
        
        btn.innerHTML = `<strong>${belongText}${p.name}</strong><br>${statHTML}<br><span style="font-size:9px; ${descStyle}">${p.desc}</span>`;
        
        btn.onclick = () => selectPlayerFromPool(p);
        container.appendChild(btn);
    });
}

function selectPlayerFromPool(player) {
    const belonging = getPlayerBelonging(player.id);
    if (belonging) {
        alert("その選手は既にいずれかのチームのオーダーに入っています（重複不可）。");
        return;
    }

    let currentOrder = getTeamOrder(editingTeam);

    if (selectedSlotId) {
        assignToSlot(selectedSlotId, player, currentOrder);
    } else {
        // 自動割り当て
        if (currentPoolTab === 'batter') {
            let idx = currentOrder.batters.findIndex(b => b === null);
            if (idx !== -1) currentOrder.batters[idx] = player;
            else alert("スロットがいっぱいです。変更したい枠を直接選んでください。");
        } else if (currentPoolTab === 'pitcher-sp') {
            currentOrder.sp = player;
        } else if (currentPoolTab === 'pitcher-rp') {
            let idx = currentOrder.rp.findIndex(r => r === null);
            if (idx !== -1) currentOrder.rp[idx] = player;
            else alert("リリーフ枠がいっぱいです。");
        }
    }
    selectedSlotId = null;
    renderPoolButtons();
    renderSlots();
}

function assignToSlot(slotId, player, currentOrder) {
    if (slotId.startsWith('b_')) {
        if (currentPoolTab !== 'batter') { alert("この枠には野手しか配置できません。"); return; }
        let idx = parseInt(slotId.split('_')[1]);
        currentOrder.batters[idx] = player;
    } else if (slotId === 'sp') {
        if (currentPoolTab !== 'pitcher-sp') { alert("この枠には先発投手しか配置できません。"); return; }
        currentOrder.sp = player;
    } else if (slotId.startsWith('rp_')) {
        if (currentPoolTab !== 'pitcher-rp') { alert("この枠には中継ぎ・抑え投手しか配置できません。"); return; }
        let idx = parseInt(slotId.split('_')[1]);
        currentOrder.rp[idx] = player;
    }
}

// 右側スロットレンダリング
function renderSlots() {
    const container = document.getElementById('slots-container');
    container.innerHTML = '';

    let currentOrder = getTeamOrder(editingTeam);

    createSlotDOM(container, "sp", "先発投手", currentOrder.sp, true);
    for (let i = 0; i < 9; i++) {
        createSlotDOM(container, `b_${i}`, `${i+1}番打者`, currentOrder.batters[i], false);
    }
    for (let i = 0; i < 3; i++) {
        createSlotDOM(container, `rp_${i}`, `控え投手${i+1}`, currentOrder.rp[i], true);
    }
}

function createSlotDOM(container, id, labelText, playerObj, isPitcher) {
    const div = document.createElement('div');
    div.className = `slot-row ${isPitcher ? 'pitcher-slot' : ''}`;
    if (selectedSlotId === id) {
        div.style.outline = "2px solid #3498db";
        div.style.background = "#34495e";
    }

    const lbl = document.createElement('span');
    lbl.className = 'slot-label';
    lbl.innerText = labelText;
    div.appendChild(lbl);

    const val = document.createElement('span');
    val.className = 'slot-value';
    if (playerObj) {
        let statHTML = "";
        if (!isPitcher) {
            statHTML = `<span class="stat-badge" style="background:${getStatColor(playerObj.meet)};">ミ:${playerObj.meet}</span>
                        <span class="stat-badge" style="background:${getStatColor(playerObj.power)};">パ:${playerObj.power}</span>`;
        } else {
            statHTML = `<span class="stat-badge" style="background:${getStatColor(playerObj.power)};">球:${playerObj.power}</span>
                        <span class="stat-badge" style="background:${getStatColor(playerObj.control)};">制:${playerObj.control}</span>`;
        }
        val.innerHTML = `${playerObj.name} <span style="font-size:11px;color:#aaa;">[${playerObj.desc}]</span> ${statHTML}`;
    } else {
        val.innerText = "【未選択 - プールから選んでください】";
        val.style.color = "#888";
    }
    val.onclick = () => {
        selectedSlotId = id;
        if (id === 'sp') switchPoolTab('pitcher-sp');
        else if (id.startsWith('rp_')) switchPoolTab('pitcher-rp');
        else switchPoolTab('batter');
        renderSlots();
    };
    div.appendChild(val);

    if (playerObj) {
        const cancel = document.createElement('button');
        cancel.className = 'slot-cancel-btn';
        cancel.innerText = "外す";
        cancel.onclick = (e) => {
            e.stopPropagation();
            let currentOrder = getTeamOrder(editingTeam);
            if (id === 'sp') currentOrder.sp = null;
            else if (id.startsWith('b_')) currentOrder.batters[parseInt(id.split('_')[1])] = null;
            else if (id.startsWith('rp_')) currentOrder.rp[parseInt(id.split('_')[1])] = null;
            renderPoolButtons();
            renderSlots();
        };
        div.appendChild(cancel);
    }
    container.appendChild(div);
}

// 選択中のチームをおまかせ編成
function autoFillCurrentOrder() {
    let currentOrder = getTeamOrder(editingTeam);
    
    for (let i = 0; i < 9; i++) {
        if (!currentOrder.batters[i]) {
            let p = masterPlayers.batter.find(b => !getPlayerBelonging(b.id));
            if (p) currentOrder.batters[i] = p;
        }
    }
    if (!currentOrder.sp) {
        let p = masterPlayers['pitcher-sp'].find(sp => !getPlayerBelonging(sp.id));
        if (p) currentOrder.sp = p;
    }
    for (let i = 0; i < 3; i++) {
        if (!currentOrder.rp[i]) {
            let p = masterPlayers['pitcher-rp'].find(r => !getPlayerBelonging(r.id));
            if (p) currentOrder.rp[i] = p;
        }
    }
    renderPoolButtons();
    renderSlots();
}

// 試合開始前のチェック
function startGameMode() {
    if (homeOrder.batters.some(b => b === null) || !homeOrder.sp || homeOrder.rp.some(r => r === null) ||
        awayOrder.batters.some(b => b === null) || !awayOrder.sp || awayOrder.rp.some(r => r === null)) {
        alert("「マイチーム」と「ライバルズ」両方の全スロット（打者9人、先発1人、控え3人）を編成してから試合に進んでください！");
        return;
    }
    switchPage('game');
    initGame();
}


// ==========================================
//        試合進行シミュレータエンジン
// ==========================================
let game = {};
let currentPitcher = { home: null, away: null };

function initGame() {
    document.getElementById('reset-game-btn').classList.add('hidden');
    document.getElementById('next-pitch-btn').disabled = false;
    document.getElementById('skip-7th-btn').disabled = false;
    document.getElementById('skip-8th-btn').disabled = false;
    document.getElementById('auto-game-btn').disabled = false;

    game = {
        inning: 1, isTop: true, outs: 0, balls: 0, strikes: 0,
        runners: [false, false, false],
        homeScores: Array(9).fill("-"), awayScores: Array(9).fill("-"),
        homeTotal: 0, awayTotal: 0, homeBatterIdx: 0, awayBatterIdx: 0, gameOver: false
    };
    game.homeScores[0] = 0;

    // 自作/プールデータから試合用データをクローン
    game.homeTeam = {
        name: "マイチーム",
        players: homeOrder.batters.map(b => ({ ...b, currentPower: b.power })),
        pitchers: [
            { ...homeOrder.sp, name: homeOrder.sp.name + "(先)", currentPower: homeOrder.sp.power },
            ...homeOrder.rp.map((r, i) => ({ ...r, name: r.name + `(継${i+1})`, currentPower: r.power }))
        ]
    };

    game.awayTeam = {
        name: "ライバルズ",
        players: awayOrder.batters.map(b => ({ ...b, currentPower: b.power })),
        pitchers: [
            { ...awayOrder.sp, name: awayOrder.sp.name + "(先)", currentPower: awayOrder.sp.power },
            ...awayOrder.rp.map((r, i) => ({ ...r, name: r.name + `(継${i+1})`, currentPower: r.power }))
        ]
    };

    currentPitcher.home = game.homeTeam.pitchers[0];
    currentPitcher.away = game.awayTeam.pitchers[0];

    document.getElementById('game-log').innerHTML = "【試合開始】完全自作の両チームでプレイボール！<br>";
    renderLiveRosters();
    updateUI();
}

function renderLiveRosters() {
    ['home', 'away'].forEach(side => {
        const tbody = document.getElementById(`${side}-live-roster`);
        tbody.innerHTML = '';
        let team = side === 'home' ? game.homeTeam : game.awayTeam;
        team.players.forEach((p, idx) => {
            const tr = document.createElement('tr');
            tr.id = `${side}-batter-${idx}`;
            tr.innerHTML = `<td>${idx+1}</td><td>${p.name}</td>`;
            tbody.appendChild(tr);
        });
    });
}

function stepPitch() {
    if (game.gameOver) return;

    let batter = game.isTop ? game.homeTeam.players[game.homeBatterIdx] : game.awayTeam.players[game.awayBatterIdx];
    let pitcher = game.isTop ? currentPitcher.away : currentPitcher.home;

    pitcher.currentPower = Math.max(20, pitcher.currentPower - 0.3);

    let rand = Math.random() * 100;
    let inPlayChance = 45;
    let strikeChance = 35 + (pitcher.control * 0.2) - (batter.meet * 0.05);

    if (rand < inPlayChance) {
        let diffM = batter.meet - pitcher.currentPower;
        let hitChance = 45 + (diffM * 0.5);
        if (Math.random() * 100 < hitChance) {
            let diffP = batter.power - pitcher.currentPower;
            let hrChance = 5 + (diffP * 0.2);
            let bases = 1;
            let txt = "シングルヒット！";
            if (Math.random() * 100 < hrChance) { bases = 4; txt = "特大ホームラン！！"; }
            else if (Math.random() > 0.75) { bases = 2; txt = "ツーベースヒット！"; }

            addLog(`🔥 ${batter.name}、${txt}`);
            showVisualResult(bases === 4 ? "HOME RUN!!" : "HIT", "#ffff00");
            advanceRunners(bases);
            resetCount(); nextBatter();
        } else {
            addLog(`❌ ${batter.name}、打ち取られてアウト。`);
            showVisualResult("OUT", "#aaa");
            processOut();
        }
    } else if (rand < inPlayChance + strikeChance) {
        game.strikes++;
        if (game.strikes >= 3) {
            addLog(`❌ ${batter.name}、見逃し三振！`);
            showVisualResult("STRIKE OUT", "#ff3333");
            processOut();
        } else {
            showVisualResult("STRIKE", "#ffcc00");
        }
    } else {
        game.balls++;
        if (game.balls >= 4) {
            addLog(`🚶 ${batter.name}、フォアボールを選ぶ。`);
            showVisualResult("WALK", "#00ffcc");
            processWalk();
        } else {
            showVisualResult("BALL", "#00ff00");
        }
    }

    check継投();
    updateUI();
}

function check継投() {
    // マイチーム（先攻・守備は裏）の継投（7回・9回）
    if (!game.isTop) {
        if (game.inning === 7 && currentPitcher.home === game.homeTeam.pitchers[0]) {
            currentPitcher.home = game.homeTeam.pitchers[1];
            addLog(`📣 【マイチーム】ピッチャー交代、継投策で ${currentPitcher.home.name}！`);
        }
        if (game.inning === 9 && currentPitcher.home === game.homeTeam.pitchers[1]) {
            currentPitcher.home = game.homeTeam.pitchers[2];
            addLog(`📣 【マイチーム】クローザー投入、${currentPitcher.home.name}！`);
        }
    }
    // ライバルズ（後攻・守備は表）の継投（7回・9回）
    if (game.isTop) {
        if (game.inning === 7 && currentPitcher.away === game.awayTeam.pitchers[0]) {
            currentPitcher.away = game.awayTeam.pitchers[1];
            addLog(`📣 【ライバルズ】ピッチャー交代、${currentPitcher.away.name}！`);
        }
        if (game.inning === 9 && currentPitcher.away === game.awayTeam.pitchers[1]) {
            currentPitcher.away = game.awayTeam.pitchers[2];
            addLog(`📣 【ライバルズ】最終回のマウンドは、${currentPitcher.away.name}！`);
        }
    }
}

function advanceRunners(bases) {
    let runs = 0;
    for (let b = 0; b < bases; b++) {
        if (game.runners[2]) { runs++; game.runners[2] = false; }
        if (game.runners[1]) { game.runners[2] = true; game.runners[1] = false; }
        if (game.runners[0]) { game.runners[1] = true; game.runners[0] = false; }
        if (b === 0) game.runners[0] = true;
        else if (b === 1) { game.runners[0] = false; game.runners[1] = true; }
    }
    if (runs > 0) addPoints(runs);
}

function processWalk() {
    let runs = 0;
    if (game.runners[0]) {
        if (game.runners[1]) {
            if (game.runners[2]) { runs++; }
            game.runners[2] = true;
        }
        game.runners[1] = true;
    }
    game.runners[0] = true;
    if (runs > 0) { addPoints(runs); addLog(`✨ 押し出し四球で1点！`); }
    resetCount(); nextBatter();
}

function processOut() {
    game.outs++;
    resetCount();
    if (game.outs >= 3) {
        addLog(`チェンジ！`);
        game.runners = [false, false, false]; game.outs = 0;

        if (!game.isTop && game.inning >= 9) { endGame(); } 
        else if (game.isTop) {
            game.isTop = false; game.awayScores[game.inning - 1] = 0;
            addLog(`\n--- ${game.inning}回裏 ${game.awayTeam.name}の攻撃 ---`);
        } else {
            game.inning++;
            if (game.inning > 9) { endGame(); } 
            else {
                game.isTop = true; game.homeScores[game.inning - 1] = 0;
                addLog(`\n--- ${game.inning}回表 ${game.homeTeam.name}の攻撃 ---`);
            }
        }
    }
    nextBatter();
}

function addPoints(runs) {
    if (game.isTop) {
        game.homeTotal += runs;
        game.homeScores[game.inning - 1] = (game.homeScores[game.inning - 1] === "-" ? 0 : game.homeScores[game.inning - 1]) + runs;
    } else {
        game.awayTotal += runs;
        game.awayScores[game.inning - 1] = (game.awayScores[game.inning - 1] === "-" ? 0 : game.awayScores[game.inning - 1]) + runs;
    }
}

function endGame() {
    game.gameOver = true;
    addLog(`\n🎉 【試合終了】 ${game.homeTeam.name} ${game.homeTotal} - ${game.awayTotal} ${game.awayTeam.name}`);
    document.getElementById('reset-game-btn').classList.remove('hidden');
    document.getElementById('next-pitch-btn').disabled = true;
    document.getElementById('skip-7th-btn').disabled = true;
    document.getElementById('skip-8th-btn').disabled = true;
    document.getElementById('auto-game-btn').disabled = true;
}

function resetCount() { game.balls = 0; game.strikes = 0; }
function nextBatter() {
    if (game.gameOver) return;
    if (game.isTop) { game.homeBatterIdx = (game.homeBatterIdx + 1) % 9; } 
    else { game.awayBatterIdx = (game.awayBatterIdx + 1) % 9; }
}

function showVisualResult(text, color) {
    const el = document.getElementById('pitch-result-text');
    el.innerText = text; el.style.color = color;
}
function addLog(text) {
    const logDiv = document.getElementById('game-log'); logDiv.innerHTML += text + "<br>"; logDiv.scrollTop = logDiv.scrollHeight;
}
function autoPlayGame() { while (!game.gameOver) { stepPitch(); } }

// 指定したイニング（の表）まで一気に試合を進める関数
function skipToInning(targetInning) {
    if (game.gameOver) return;
    
    // すでに指定イニングを超えている場合は何もしない
    if (game.inning >= targetInning) {
        alert(`すでに ${targetInning} 回以降、またはそのイニングの攻撃中・終了後です。`);
        return;
    }

    addLog(`\n⏩ ${targetInning}回表まで試合をスキップします...`);
    
    // 指定イニングの「表」に到達する、もしくはゲームが終了するまでループ
    while (!game.gameOver && !(game.inning === targetInning && game.isTop)) {
        stepPitch();
    }
}

function updateUI() {
    const header = document.getElementById('sb-header');
    const homeRow = document.getElementById('sb-home');
    const awayRow = document.getElementById('sb-away');
    let head = '<th>TEAM</th>';
    let hLine = `<td>マイチーム</td>`;
    let aLine = `<td>ライバルズ</td>`;
    for (let i = 1; i <= 9; i++) {
        head += `<th>${i}</th>`; hLine += `<td>${game.homeScores[i-1]}</td>`; aLine += `<td>${game.awayScores[i-1]}</td>`;
    }
    head += '<th class="total">R</th>'; hLine += `<td class="total">${game.homeTotal}</td>`; aLine += `<td class="total">${game.awayTotal}</td>`;
    header.innerHTML = head; homeRow.innerHTML = hLine; awayRow.innerHTML = aLine;

    document.getElementById('dots-b').innerHTML = '●'.repeat(game.balls) + '○'.repeat(3 - game.balls);
    document.getElementById('dots-s').innerHTML = '●'.repeat(game.strikes) + '○'.repeat(2 - game.strikes);
    document.getElementById('dots-o').innerHTML = '●'.repeat(game.outs) + '○'.repeat(2 - game.outs);
    document.getElementById('first-base').className = game.runners[0] ? 'base active' : 'base';
    document.getElementById('second-base').className = game.runners[1] ? 'base active' : 'base';
    document.getElementById('third-base').className = game.runners[2] ? 'base active' : 'base';
    
    document.getElementById('match-info').innerText = game.gameOver ? "試合終了" : `${game.inning}回${game.isTop ? '表' : '裏'} 攻撃中`;
    document.getElementById(`home-live-pitcher`).innerText = `投: ${currentPitcher.home.name} (球威:${Math.round(currentPitcher.home.currentPower)})`;
    document.getElementById(`away-live-pitcher`).innerText = `投: ${currentPitcher.away.name} (球威:${Math.round(currentPitcher.away.currentPower)})`;

    ['home', 'away'].forEach(side => {
        for (let i = 0; i < 9; i++) {
            let el = document.getElementById(`${side}-batter-${i}`);
            if(el) el.classList.remove('highlight');
        }
    });
    if (!game.gameOver) {
        if (game.isTop) { document.getElementById(`home-batter-${game.homeBatterIdx}`).classList.add('highlight'); } 
        else { document.getElementById(`away-batter-${game.awayBatterIdx}`).classList.add('highlight'); }
    }
}

// 1番初期はおまかせで初期化可能にするためのヘルパー
autoFillCurrentOrder(); // マイチーム初期化
switchEditingTeam('away');
autoFillCurrentOrder(); // ライバルズ初期化
switchEditingTeam('home');
</script>
